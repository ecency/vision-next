# Ecency Multi-Tenant Blog Hosting - Nginx Configuration
# This config routes requests to tenant-specific configs based on hostname

# Upstream for the hosting API
upstream hosting_api {
    server hosting-api:3001;
}

# Map hostname to tenant ID
# Format: subdomain.blogs.ecency.com -> subdomain
# Custom domains are handled via API lookup
map $host $tenant_id {
    default "";

    # Wildcard subdomain matching.
    # Hive account names may contain dots (e.g. alice.dev), so the tenant label
    # can span multiple DNS labels. Charset is restricted to Hive-legal characters
    # so $tenant_id can never introduce a path separator into try_files below;
    # the leading char must be alphanumeric, so it cannot start a relative path.
    ~^(?<subdomain>[a-z0-9][a-z0-9.-]*)\.blogs\.ecency\.com$ $subdomain;

    # Custom domains are resolved via X-Tenant-Id header from Traefik
    # or looked up via the hosting API
}

# Custom domains: the host nginx terminates TLS and proxies here with X-Tenant-Id set to
# the tenant. Resolved via map, NOT via set/if inside the location: an if{} that matches
# suppresses the location's try_files (nginx if-is-evil), which turned every headerless
# custom-domain request into a 404 instead of the default config.
map $http_x_tenant_id $custom_tenant_id {
    "" $host;
    default $http_x_tenant_id;
}

# Cache for tenant config lookups
proxy_cache_path /var/cache/nginx/tenant_configs levels=1:2 keys_zone=tenant_cache:10m max_size=100m inactive=60m;

server {
    listen 80;
    server_name *.blogs.ecency.com;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    
    # Serve tenant-specific config.json based on hostname
    location = /config.json {
        # Try tenant-specific config first, fallback to default
        try_files /configs/$tenant_id.json /configs/default.json =404;
        
        # No caching for config
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Tenant-Id $tenant_id;
    }
    
    # Alternative: Dynamic config from API (for custom domains)
    location = /api/config {
        internal;
        proxy_pass http://hosting_api/v1/tenants/$tenant_id/config;
        proxy_cache tenant_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_key $tenant_id;
    }
    
    # Head metadata injected into index.html via SSI: the tenant's real title,
    # description and OG tags (generated by the hosting API), so unfurls and
    # crawlers see the blog's identity. Falls back to the generic /meta.html
    # shipped in the app bundle.
    location = /__tenant-meta {
        internal;
        ssi off;
        default_type text/html;
        try_files /configs/$tenant_id.meta.html /meta.html =404;
    }

    # Static assets - shared across all tenants
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback - all routes serve index.html (SSI resolves the head metadata)
    location / {
        ssi on;
        try_files $uri $uri/ /index.html;

        # No cache for HTML
        add_header Cache-Control "no-cache";
    }
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_comp_level 6;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# Server block for custom domains (host nginx proxies them here with X-Tenant-Id).
# default_server is required: without it nginx routes unmatched hostnames to the FIRST
# server block above, which resolves tenants by subdomain only and ignores X-Tenant-Id.
server {
    listen 80 default_server;
    server_name _; # Catch-all for custom domains
    
    root /usr/share/nginx/html;
    index index.html;

    # $custom_tenant_id comes from the http-level map: X-Tenant-Id header, else $host.
    location = /config.json {
        try_files /configs/$custom_tenant_id.json /configs/default.json =404;

        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Tenant-Id $custom_tenant_id;
    }

    # Head metadata for the SSI include (mirrors the wildcard block, keyed by custom tenant).
    location = /__tenant-meta {
        internal;
        ssi off;
        default_type text/html;
        try_files /configs/$custom_tenant_id.meta.html /meta.html =404;
    }

    # Same static asset handling
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        ssi on;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
