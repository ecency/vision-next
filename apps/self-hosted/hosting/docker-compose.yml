# Ecency Managed Hosting Platform
# Multi-tenant blog hosting infrastructure
# SSL terminated by nginx (Cloudflare origin cert + LE wildcard)

services:
  # ==========================================================================
  # Blog Server - Serves static SPA with multi-tenant config routing
  # ==========================================================================
  blog-server:
    image: ecency/self-hosted:${TAG:?TAG environment variable is required}
    container_name: ecency-hosting-blog
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:80"
    volumes:
      - "./nginx-multi-tenant.conf:/etc/nginx/conf.d/default.conf:ro"
      - "tenant-configs:/usr/share/nginx/html/configs"
      - "./default-config.json:/usr/share/nginx/html/configs/default.json:ro"
    networks:
      - ecency-hosting
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ==========================================================================
  # Hosting API - Tenant management, subscriptions, config generation
  # ==========================================================================
  hosting-api:
    image: ecency/hosting-api:${TAG:?TAG environment variable is required}
    container_name: ecency-hosting-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3101:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/hosting
      - REDIS_URL=redis://redis:6379
      - HIVE_API_URL=${HIVE_API_URL:-https://api.hive.blog}
      - PAYMENT_ACCOUNT=${PAYMENT_ACCOUNT:-ecency.hosting}
      - BASE_DOMAIN=${BASE_DOMAIN:-blogs.ecency.com}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - "tenant-configs:/app/configs"
    networks:
      - ecency-hosting
    depends_on:
      - postgres
      - redis

  # ==========================================================================
  # HBD Payment Listener - Monitors blockchain for subscription payments
  # ==========================================================================
  payment-listener:
    image: ecency/hosting-api:${TAG:?TAG environment variable is required}
    command: ["npx", "tsx", "src/payment-listener.ts"]
    # Reuses API image with different entrypoint
    container_name: ecency-hosting-payments
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/hosting
      - REDIS_URL=redis://redis:6379
      - HIVE_API_URL=${HIVE_API_URL:-https://api.hive.blog}
      - PAYMENT_ACCOUNT=${PAYMENT_ACCOUNT:-ecency.hosting}
      - MONTHLY_PRICE_HBD=${MONTHLY_PRICE_HBD:-0.100}
    networks:
      - ecency-hosting
    depends_on:
      - postgres
      - redis

  # ==========================================================================
  # PostgreSQL - Persistent data storage
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ecency-hosting-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=hosting
    volumes:
      - "postgres-data:/var/lib/postgresql/data"
      - "./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro"
    networks:
      - ecency-hosting
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Redis - Caching and pub/sub
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: ecency-hosting-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - "redis-data:/data"
    networks:
      - ecency-hosting
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ecency-hosting:
    name: ecency-hosting
    driver: bridge

volumes:
  tenant-configs:
  postgres-data:
  redis-data:
