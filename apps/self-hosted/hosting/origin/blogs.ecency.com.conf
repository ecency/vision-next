# ==========================================================================
# Ecency Managed Blog Hosting
# blogs.ecency.com (CF proxied) + *.blogs.ecency.com (DNS-only, LE wildcard)
# ==========================================================================

# --- HTTP redirect (all blog hosts) ---
server {
    listen 80;
    listen [::]:80;
    server_name blogs.ecency.com *.blogs.ecency.com;

    # Hive account names may contain dots (e.g. louis.random), so those tenants sit
    # two labels deep and the wildcard cert cannot cover them; they get a per-host
    # cert issued over HTTP-01, which needs this challenge path to survive the
    # redirect below. See hosting-domains/sync-custom-domains.py.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- blogs.ecency.com (landing / signup) - behind Cloudflare ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name blogs.ecency.com;

    ssl_certificate     /etc/ssl/certs/cert.pem;
    ssl_certificate_key /etc/ssl/private/key.pem;
    ssl_client_certificate /etc/ssl/certs/cloudflare.crt;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:3100;
    }
}

# --- api.blogs.ecency.com (hosting API) - DNS-only, LE wildcard cert ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.blogs.ecency.com;

    ssl_certificate     /etc/letsencrypt/live/blogs.ecency.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blogs.ecency.com/privkey.pem;

    # Strip /hosting prefix for backward compat with apiBaseUrl default
    location /hosting/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://127.0.0.1:3101/;
    }

    # Direct API access
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://127.0.0.1:3101;
    }
}

# --- *.blogs.ecency.com (tenant blogs) - DNS-only, LE wildcard cert ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.blogs.ecency.com;

    ssl_certificate     /etc/letsencrypt/live/blogs.ecency.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blogs.ecency.com/privkey.pem;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Only the custom-domain vhosts are entitled to set this; clear any client-supplied
        # value so it can never reach the container's tenant lookup from here.
        proxy_set_header X-Tenant-Id "";
        proxy_pass http://127.0.0.1:3100;
    }
}
