version: "3.7"

services:
  vapi:
    image: ecency/api:latest
    environment:
      - PRIVATE_API_ADDR
      - PRIVATE_API_AUTH
      - HIVESIGNER_SECRET
      - SEARCH_API_ADDR
      - SEARCH_API_SECRET
      - CHAINSTACK_API_KEY
      - CHAINZ_API_KEY
      - BLOCKSTREAM_CLIENT_ID
      - BLOCKSTREAM_CLIENT_SECRET
    restart: always
    ports:
      - "4000:4000"
    hostname: vapi
    networks:
      - vision

  web:
    image: ecency/vision-next:develop
    stop_grace_period: 30s
    deploy:
      replicas: 4
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        order: start-first
    environment:
      - USE_PRIVATE
      - INTERNAL_API_HOST=http://vapi:4000
      - REDIS_URL=redis://redis:6379
      - HIVESIGNER_SECRET
      - PLAUSIBLE_API_KEY
      - NEXT_PUBLIC_GMAPS_MAP_ID
      - NEXT_PUBLIC_GMAPS_API_KEY
      - MATTERMOST_BASE_URL
      - MATTERMOST_ADMIN_TOKEN
      - MATTERMOST_TEAM_ID
      - MATTERMOST_WS_ALLOWED_ORIGINS
      - THREESPEAK_EMBED_API_KEY
    restart: always
    ports:
      - "3000:3000"
    hostname: web
    networks:
      - vision

  # Per-stack Redis used as the L2 cache for post-age lookups in the Next.js
  # middleware (see apps/web/src/features/next-middleware/post-age-cache.ts).
  # Each origin server runs a single-node swarm, so today this is also a
  # per-host Redis. If an origin is ever scaled to multi-node, revisit:
  # `replicas: 1` + manager constraint means one Redis for the whole swarm,
  # not one per node — would need `mode: global` + service discovery work.
  # Lives only on the docker overlay network — never publish 6379 publicly.
  # Persistence: AOF every 1s (acceptable <1s write loss for a refetchable cache).
  # Memory cap: 1gb LRU — well above the post-age working set; headroom for
  # future cache layers (API responses, profile/community metadata) on this
  # same instance without re-sizing.
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
    restart: always
    hostname: redis
    networks:
      - vision
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

networks:
  vision:
    external: true

volumes:
  redis_data:
