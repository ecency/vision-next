version: "3.7"

services:
  vapi:
    image: ecency/api:latest
    # Pin the search backend hostname to the origin IP so vapi connects directly,
    # bypassing a Cloudflare colo<->origin path that can hang for minutes (broke
    # all US-routed search on 2026-06-08). Keeps the hostname for SNI/cert. The IP
    # comes from the HIVESEARCHER_ORIGIN_IP secret (never committed to this public
    # repo); update it if the search box IP changes.
    extra_hosts:
      - "api.hivesearcher.com:${HIVESEARCHER_ORIGIN_IP:?set HIVESEARCHER_ORIGIN_IP secret = hivesearcher origin IP}"
    environment:
      - PRIVATE_API_ADDR
      - PRIVATE_API_AUTH
      - HIVESIGNER_SECRET
      - SEARCH_API_ADDR
      - SEARCH_API_SECRET
      - CHAINSTACK_API_KEY
      - CHAINZ_API_KEY
      - BLOCKSTREAM_CLIENT_ID
      - BLOCKSTREAM_CLIENT_SECRET
    restart: always
    ports:
      - "4000:4000"
    hostname: vapi
    networks:
      - vision

  web:
    image: ecency/vision-next:latest
    stop_grace_period: 30s
    deploy:
      replicas: ${WEB_REPLICAS:-4}
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        order: start-first
    environment:
      - USE_PRIVATE
      - INTERNAL_API_HOST=http://vapi:4000
      - REDIS_URL=redis://redis:6379
      - HIVESIGNER_SECRET
      - NODE_ENV
      - PLAUSIBLE_API_KEY
      - NEXT_PUBLIC_GMAPS_MAP_ID
      - NEXT_PUBLIC_GMAPS_API_KEY
      - MATTERMOST_BASE_URL
      - MATTERMOST_ADMIN_TOKEN
      - MATTERMOST_TEAM_ID
      - MATTERMOST_WS_ALLOWED_ORIGINS
      - THREESPEAK_EMBED_API_KEY
      - SEO_CRON_SECRET
      - SEO_BLACKLIST_URL
    restart: always
    ports:
      - "3000:3000"
    hostname: web
    networks:
      - vision

  # Single internal scheduler for the SEO maintenance routes (sitemap
  # regeneration hourly + abuse-blacklist refresh daily at ~03:00 UTC).
  # One manager-pinned replica, so the cron fires exactly once per swarm —
  # not once per web replica. It only ever talks to web:3000 over the
  # internal `vision` overlay, so the x-seo-cron-secret header never crosses
  # the public edge / Cloudflare. No published ports; the secret is injected
  # from the deploy environment and is never echoed (curl output discarded).
  # $$ escapes keep the loop's $ literal through `docker-compose config`.
  seocron:
    image: curlimages/curl:8.11.1
    environment:
      - SEO_CRON_SECRET
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Fail fast (and crash-loop visibly) rather than silently no-op if
        # the secret never made it into the deploy environment.
        if [ -z "$$SEO_CRON_SECRET" ]; then
          echo "seocron: SEO_CRON_SECRET is empty/unset - refusing to start" >&2
          exit 1
        fi
        # Deploy-time prime: /sitemap.xml is advertised in robots.txt, so it
        # must not 404 until the first hour boundary. Retry covers web not
        # being ready yet (swarm starts services in parallel; depends_on is
        # not honored). The first published sitemap MUST be abuse-filtered,
        # so break only once BOTH the blacklist refresh AND the sitemap
        # generation have succeeded — a slow/failed blacklist (an origin with
        # high latency to the source) must not leave it empty until the next
        # daily run. If the blacklist never succeeds here, the steady loop
        # keeps retrying (prefer a slightly delayed but filtered sitemap).
        P=0
        BL=0
        while [ "$$P" -lt 30 ]; do
          if [ "$$BL" -eq 0 ] && curl -fsS --max-time 90 -X POST -H "x-seo-cron-secret: $$SEO_CRON_SECRET" http://web:3000/api/internal/seo/blacklist-refresh >/dev/null 2>&1; then
            BL=1
          fi
          if [ "$$BL" -eq 1 ] && curl -fsS --max-time 180 -X POST -H "x-seo-cron-secret: $$SEO_CRON_SECRET" http://web:3000/api/internal/seo/sitemap-generate >/dev/null 2>&1; then
            break
          fi
          P=$$((P + 1))
          sleep 10
        done
        while true; do
          S=$$(( 3600 - $$(date -u +%s) % 3600 ))
          sleep "$$S"
          # Keep the blacklist populated: daily at 03:00, AND every hour
          # until the first success — a cold origin whose prime never
          # reached the source must not publish an unfiltered sitemap. BL
          # stays 1 once set (Redis keeps last-good if a later refresh
          # fails). Blacklist runs before sitemap so 03:00 reflects today.
          if [ "$$BL" -eq 0 ] || [ "$$(date -u +%H)" = "03" ]; then
            if curl -fsS --max-time 90 -X POST -H "x-seo-cron-secret: $$SEO_CRON_SECRET" http://web:3000/api/internal/seo/blacklist-refresh >/dev/null 2>&1; then
              BL=1
            fi
          fi
          # Never publish an unfiltered sitemap.
          if [ "$$BL" -eq 1 ]; then
            curl -fsS --max-time 180 -X POST -H "x-seo-cron-secret: $$SEO_CRON_SECRET" http://web:3000/api/internal/seo/sitemap-generate >/dev/null 2>&1 || true
          fi
        done
    restart: always
    hostname: seocron
    networks:
      - vision
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

  # Per-stack Redis used as the L2 cache for post-age lookups in the Next.js
  # middleware (see apps/web/src/features/next-middleware/post-age-cache.ts).
  # Each origin server runs a single-node swarm, so today this is also a
  # per-host Redis. If an origin is ever scaled to multi-node, revisit:
  # `replicas: 1` + manager constraint means one Redis for the whole swarm,
  # not one per node — would need `mode: global` + service discovery work.
  # Lives only on the docker overlay network — never publish 6379 publicly.
  # Persistence: AOF every 1s (acceptable <1s write loss for a refetchable cache).
  # Memory cap: 1gb LRU — well above the post-age working set; headroom for
  # future cache layers (API responses, profile/community metadata) on this
  # same instance without re-sizing.
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 1gb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
    restart: always
    hostname: redis
    networks:
      - vision
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

networks:
  vision:
    external: true

volumes:
  redis_data:
