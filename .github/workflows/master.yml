name: Master CI/CD
on:
  push:
    branches:
      - main
jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_GMAPS_API_KEY: ${{ secrets.GMAPS_API_KEY }}
      NEXT_PUBLIC_GMAPS_MAP_ID: ${{ secrets.GMAPS_MAP_ID }}
    strategy:
      matrix:
        node-version: [20.x]
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v3
      with:
        version: 10.18.1
        run_install: false
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      env:
        CI: true
    - name: Run Tests
      run: pnpm -r test
    - name: Build packages
      run: pnpm build:packages
    - name: Build web app
      run: pnpm --filter @ecency/web build
      env:
        CI: true
  build:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ecency/vision-next:latest
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=ecency
            SENTRY_PROJECT=ecency-next
            SENTRY_RELEASE=ecency-next@${{ github.sha }}
            NEXT_PUBLIC_GMAPS_API_KEY=${{ secrets.GMAPS_API_KEY }}
            NEXT_PUBLIC_GMAPS_MAP_ID=${{ secrets.GMAPS_MAP_ID }}
            PNPM_VERSION=10.18.1

      # Sentry's source-map upload runs inside the Docker build via the
      # @sentry/nextjs webpack plugin (see apps/web/next.config.js). It can
      # silently no-op if the auth token is invalid, scope-restricted, or
      # rate-limited — which leaves production stack traces minified and
      # unactionable. Verify the release was created and at least one file
      # is attached before letting the deploy jobs proceed.
      - name: Verify Sentry source maps uploaded
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_RELEASE: ecency-next@${{ github.sha }}
        run: |
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN not set — skipping source-map verification"
            exit 0
          fi
          set -euo pipefail
          # The release name is URL-encoded because it contains '@'.
          ENCODED_RELEASE=$(printf '%s' "${SENTRY_RELEASE}" | jq -sRr @uri)
          echo "Checking Sentry release ${SENTRY_RELEASE}…"
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            "https://sentry.io/api/0/projects/ecency/ecency-next/releases/${ENCODED_RELEASE}/files/?per_page=1")
          body=$(echo "$response" | sed '$d')
          code=$(echo "$response" | tail -n1)
          if [ "$code" = "404" ]; then
            echo "::error::Sentry release ${SENTRY_RELEASE} does not exist — source-map upload failed during the Docker build"
            exit 1
          fi
          if [ "$code" != "200" ]; then
            echo "::error::Sentry API returned ${code} for release ${SENTRY_RELEASE}"
            echo "$body"
            exit 1
          fi
          count=$(echo "$body" | jq 'length')
          if [ "$count" -lt 1 ]; then
            echo "::error::No source-map files attached to Sentry release ${SENTRY_RELEASE} — upload likely no-op'd"
            exit 1
          fi
          echo "✓ Sentry release ${SENTRY_RELEASE} has source maps attached"

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  deploy-EU:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: SSH and deploy node app
      uses: appleboy/ssh-action@v1.0.3
      env:
        USE_PRIVATE: ${{secrets.USE_PRIVATE}}
        PRIVATE_API_ADDR: ${{secrets.PRIVATE_API_ADDR}}
        PRIVATE_API_AUTH: ${{secrets.PRIVATE_API_AUTH}}
        HIVESIGNER_SECRET: ${{secrets.HIVESIGNER_SECRET}}
        SEARCH_API_ADDR: ${{secrets.SEARCH_API_ADDR}}
        SEARCH_API_SECRET: ${{secrets.SEARCH_API_SECRET}}
        PLAUSIBLE_API_KEY: ${{secrets.PLAUSIBLE_API_KEY}}
        CHAINSTACK_API_KEY: ${{secrets.CHAINSTACK_API_KEY}}
        CHAINZ_API_KEY: ${{secrets.CHAINZ_API_KEY}}
        BLOCKSTREAM_CLIENT_ID: ${{secrets.BLOCKSTREAM_CLIENT_ID}}
        BLOCKSTREAM_CLIENT_SECRET: ${{secrets.BLOCKSTREAM_CLIENT_SECRET}}
        MATTERMOST_BASE_URL: ${{secrets.MATTERMOST_BASE_URL}}
        MATTERMOST_ADMIN_TOKEN: ${{secrets.MATTERMOST_ADMIN_TOKEN}}
        MATTERMOST_TEAM_ID: ${{secrets.MATTERMOST_TEAM_ID}}
        MATTERMOST_WS_ALLOWED_ORIGINS: ${{secrets.MATTERMOST_WS_ALLOWED_ORIGINS}}
        THREESPEAK_EMBED_API_KEY: ${{secrets.THREESPEAK_EMBED_API_KEY}}
      with:
        host: ${{ secrets.SSH_HOST_EU }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT }}
        envs: USE_PRIVATE,PRIVATE_API_ADDR,PRIVATE_API_AUTH,HIVESIGNER_SECRET,SEARCH_API_ADDR,SEARCH_API_SECRET,PLAUSIBLE_API_KEY,CHAINSTACK_API_KEY,CHAINZ_API_KEY,BLOCKSTREAM_CLIENT_ID,BLOCKSTREAM_CLIENT_SECRET,MATTERMOST_TEAM_ID,MATTERMOST_ADMIN_TOKEN,MATTERMOST_BASE_URL,MATTERMOST_WS_ALLOWED_ORIGINS,THREESPEAK_EMBED_API_KEY
        script: |
          export USE_PRIVATE=$USE_PRIVATE
          export PRIVATE_API_ADDR=$PRIVATE_API_ADDR
          export PRIVATE_API_AUTH=$PRIVATE_API_AUTH
          export HIVESIGNER_SECRET=$HIVESIGNER_SECRET
          export SEARCH_API_ADDR=$SEARCH_API_ADDR
          export SEARCH_API_SECRET=$SEARCH_API_SECRET
          export PLAUSIBLE_API_KEY=$PLAUSIBLE_API_KEY
          export CHAINSTACK_API_KEY=$CHAINSTACK_API_KEY
          export CHAINZ_API_KEY=$CHAINZ_API_KEY
          export BLOCKSTREAM_CLIENT_ID=$BLOCKSTREAM_CLIENT_ID
          export BLOCKSTREAM_CLIENT_SECRET=$BLOCKSTREAM_CLIENT_SECRET
          export THREESPEAK_EMBED_API_KEY=$THREESPEAK_EMBED_API_KEY
          cd ~/vision-next
          git pull origin main
          cd apps/web
          docker network create --driver overlay vision || true
          docker pull ecency/api:latest
          docker pull ecency/vision-next:latest
          docker stack deploy -c <(docker-compose -f docker-compose.production.yml config) vision
          sleep 60
          docker system prune -f

  deploy-US:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: SSH and deploy node app
      uses: appleboy/ssh-action@v1.0.3
      env:
        USE_PRIVATE: ${{secrets.USE_PRIVATE}}
        PRIVATE_API_ADDR: ${{secrets.PRIVATE_API_ADDR}}
        PRIVATE_API_AUTH: ${{secrets.PRIVATE_API_AUTH}}
        HIVESIGNER_SECRET: ${{secrets.HIVESIGNER_SECRET}}
        SEARCH_API_ADDR: ${{secrets.SEARCH_API_ADDR}}
        SEARCH_API_SECRET: ${{secrets.SEARCH_API_SECRET}}
        PLAUSIBLE_API_KEY: ${{secrets.PLAUSIBLE_API_KEY}}
        CHAINSTACK_API_KEY: ${{secrets.CHAINSTACK_API_KEY}}
        CHAINZ_API_KEY: ${{secrets.CHAINZ_API_KEY}}
        BLOCKSTREAM_CLIENT_ID: ${{secrets.BLOCKSTREAM_CLIENT_ID}}
        BLOCKSTREAM_CLIENT_SECRET: ${{secrets.BLOCKSTREAM_CLIENT_SECRET}}
        MATTERMOST_BASE_URL: ${{secrets.MATTERMOST_BASE_URL}}
        MATTERMOST_ADMIN_TOKEN: ${{secrets.MATTERMOST_ADMIN_TOKEN}}
        MATTERMOST_TEAM_ID: ${{secrets.MATTERMOST_TEAM_ID}}
        MATTERMOST_WS_ALLOWED_ORIGINS: ${{secrets.MATTERMOST_WS_ALLOWED_ORIGINS}}
        THREESPEAK_EMBED_API_KEY: ${{secrets.THREESPEAK_EMBED_API_KEY}}
      with:
        host: ${{ secrets.SSH_HOST_US }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT }}
        envs: USE_PRIVATE,PRIVATE_API_ADDR,PRIVATE_API_AUTH,HIVESIGNER_SECRET,SEARCH_API_ADDR,SEARCH_API_SECRET,PLAUSIBLE_API_KEY,CHAINSTACK_API_KEY,CHAINZ_API_KEY,BLOCKSTREAM_CLIENT_ID,BLOCKSTREAM_CLIENT_SECRET,MATTERMOST_TEAM_ID,MATTERMOST_ADMIN_TOKEN,MATTERMOST_BASE_URL,MATTERMOST_WS_ALLOWED_ORIGINS,THREESPEAK_EMBED_API_KEY
        script: |
          export USE_PRIVATE=$USE_PRIVATE
          export PRIVATE_API_ADDR=$PRIVATE_API_ADDR
          export PRIVATE_API_AUTH=$PRIVATE_API_AUTH
          export HIVESIGNER_SECRET=$HIVESIGNER_SECRET
          export SEARCH_API_ADDR=$SEARCH_API_ADDR
          export SEARCH_API_SECRET=$SEARCH_API_SECRET
          export PLAUSIBLE_API_KEY=$PLAUSIBLE_API_KEY
          export CHAINSTACK_API_KEY=$CHAINSTACK_API_KEY
          export CHAINZ_API_KEY=$CHAINZ_API_KEY
          export BLOCKSTREAM_CLIENT_ID=$BLOCKSTREAM_CLIENT_ID
          export BLOCKSTREAM_CLIENT_SECRET=$BLOCKSTREAM_CLIENT_SECRET
          export THREESPEAK_EMBED_API_KEY=$THREESPEAK_EMBED_API_KEY
          cd ~/vision-next
          git pull origin main
          cd apps/web
          docker network create --driver overlay vision || true
          docker pull ecency/api:latest
          docker pull ecency/vision-next:latest
          docker stack deploy -c <(docker-compose -f docker-compose.production.yml config) vision
          sleep 60
          docker system prune -f

  deploy-SG:
