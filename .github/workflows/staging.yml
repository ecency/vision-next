name: Staging CI/CD
on:
  push:
    branches:
      - develop
    paths-ignore:
      - 'apps/self-hosted/hosting/**'
      - '.github/workflows/self-hosted.yml'
# Default to read-only GITHUB_TOKEN. Build pushes to Docker Hub (external);
# deploy uses SSH; neither needs write access to the GitHub repo.
permissions:
  contents: read
jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_GMAPS_API_KEY: ${{ secrets.GMAPS_API_KEY }}
      NEXT_PUBLIC_GMAPS_MAP_ID: ${{ secrets.GMAPS_MAP_ID }}
    strategy:
      matrix:
        node-version: [24.x]
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v3
      with:
        version: 11.5.0
        run_install: false
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      env:
        CI: true
    - name: Run Tests
      run: pnpm -r test
    - name: Build packages
      run: pnpm build:packages
    - name: Build web app
      run: pnpm --filter @ecency/web build
      env:
        CI: true
  build:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ecency/vision-next:develop
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=ecency
            SENTRY_PROJECT=ecency-next
            SENTRY_RELEASE=ecency-next@${{ github.sha }}
            SENTRY_ENVIRONMENT=staging
            NEXT_PUBLIC_GMAPS_API_KEY=${{ secrets.GMAPS_API_KEY }}
            NEXT_PUBLIC_GMAPS_MAP_ID=${{ secrets.GMAPS_MAP_ID }}
            PNPM_VERSION=10.18.1

      # See master.yml for rationale — verifies the Sentry release was
      # populated by the in-Docker source-map upload before deploy proceeds.
      - name: Verify Sentry source maps uploaded
        uses: ./.github/actions/verify-sentry-release
        with:
          release: ecency-next@${{ github.sha }}
          auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: SSH and deploy node app
      uses: appleboy/ssh-action@v1.0.3
      env:
        USE_PRIVATE: ${{secrets.USE_PRIVATE}}
        PRIVATE_API_ADDR: ${{secrets.PRIVATE_API_ADDR}}
        PRIVATE_API_AUTH: ${{secrets.PRIVATE_API_AUTH}}
        HIVESIGNER_SECRET: ${{secrets.HIVESIGNER_SECRET}}
        SEARCH_API_ADDR: ${{secrets.SEARCH_API_ADDR}}
        SEARCH_API_SECRET: ${{secrets.SEARCH_API_SECRET}}
        HIVESEARCHER_ORIGIN_IP: ${{secrets.HIVESEARCHER_ORIGIN_IP}}
        PLAUSIBLE_API_KEY: ${{secrets.PLAUSIBLE_API_KEY}}
        CHAINSTACK_API_KEY: ${{secrets.CHAINSTACK_API_KEY}}
        CHAINZ_API_KEY: ${{secrets.CHAINZ_API_KEY}}
        BLOCKSTREAM_CLIENT_ID: ${{secrets.BLOCKSTREAM_CLIENT_ID}}
        BLOCKSTREAM_CLIENT_SECRET: ${{secrets.BLOCKSTREAM_CLIENT_SECRET}}
        MATTERMOST_BASE_URL: ${{secrets.MATTERMOST_BASE_URL}}
        MATTERMOST_ADMIN_TOKEN: ${{secrets.MATTERMOST_ADMIN_TOKEN}}
        MATTERMOST_TEAM_ID: ${{secrets.MATTERMOST_TEAM_ID}}
        MATTERMOST_WS_ALLOWED_ORIGINS: ${{secrets.MATTERMOST_WS_ALLOWED_ORIGINS}}
        THREESPEAK_EMBED_API_KEY: ${{secrets.THREESPEAK_EMBED_API_KEY}}
        SEO_CRON_SECRET: ${{secrets.SEO_CRON_SECRET}}
        SEO_BLACKLIST_URL: ${{secrets.SEO_BLACKLIST_URL}}
      with:
        host: ${{ secrets.SSH_STAGING_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT }}
        envs: USE_PRIVATE,PRIVATE_API_ADDR,PRIVATE_API_AUTH,HIVESIGNER_SECRET,SEARCH_API_ADDR,SEARCH_API_SECRET,PLAUSIBLE_API_KEY,CHAINSTACK_API_KEY,CHAINZ_API_KEY,BLOCKSTREAM_CLIENT_ID,BLOCKSTREAM_CLIENT_SECRET,MATTERMOST_TEAM_ID,MATTERMOST_ADMIN_TOKEN,MATTERMOST_BASE_URL,MATTERMOST_WS_ALLOWED_ORIGINS,THREESPEAK_EMBED_API_KEY,SEO_CRON_SECRET,SEO_BLACKLIST_URL
        script: |
          export USE_PRIVATE=$USE_PRIVATE
          export PRIVATE_API_ADDR=$PRIVATE_API_ADDR
          export PRIVATE_API_AUTH=$PRIVATE_API_AUTH
          export HIVESIGNER_SECRET=$HIVESIGNER_SECRET
          export SEARCH_API_ADDR=$SEARCH_API_ADDR
          export SEARCH_API_SECRET=$SEARCH_API_SECRET
          export PLAUSIBLE_API_KEY=$PLAUSIBLE_API_KEY
          export CHAINSTACK_API_KEY=$CHAINSTACK_API_KEY
          export CHAINZ_API_KEY=$CHAINZ_API_KEY
          export BLOCKSTREAM_CLIENT_ID=$BLOCKSTREAM_CLIENT_ID
          export BLOCKSTREAM_CLIENT_SECRET=$BLOCKSTREAM_CLIENT_SECRET
          export THREESPEAK_EMBED_API_KEY=$THREESPEAK_EMBED_API_KEY
          export SEO_CRON_SECRET=$SEO_CRON_SECRET
          export SEO_BLACKLIST_URL=$SEO_BLACKLIST_URL
          cd ~/vision-next
          git pull origin develop
          cd apps/web
          docker network create --driver overlay vision || true
          web_pull="$(docker pull ecency/vision-next:develop)"; printf '%s\n' "$web_pull"
          docker stack deploy -c <(docker-compose config) vision
          # Don't report a green deploy unless the new image actually rolled out.
          # `docker stack deploy` returns as soon as the spec is committed to Raft
          # (before Swarm populates UpdateStatus), so a crash-on-start (-> rollback)
          # or a stuck/slow rollout would otherwise pass silently. When a new image
          # was pulled, wait for vision_web to reach `completed`: never accept an
          # empty/`updating` reading as success, fail immediately on rollback/pause,
          # and fail on timeout in any non-`completed` state. Skip the wait only
          # when the image was unchanged (genuine no-op, nothing to roll out).
          if printf '%s' "$web_pull" | grep -q 'Image is up to date'; then
            echo "vision_web image unchanged; no rollout expected"
          else
            state=""
            for i in $(seq 1 60); do
              state="$(docker service inspect vision_web --format '{{if .UpdateStatus}}{{.UpdateStatus.State}}{{end}}' 2>/dev/null || echo "")"
              case "$state" in
                completed) break ;;
                rollback_*|paused)
                  echo "::error::vision_web rolled back (UpdateStatus=$state); staging still on the previous image"
                  exit 1 ;;
              esac
              sleep 5
            done
            if [ "$state" != "completed" ]; then
              echo "::error::vision_web did not converge within ~5m (UpdateStatus=${state:-empty}); staging may still be on the previous image"
              exit 1
            fi
            echo "vision_web converged (UpdateStatus=completed)"
          fi
