name: Test Web Build
on:
  push:
    branches:
      - 'develop'
# Build-only smoke test — no writes back to GitHub.
# Superseded runs are cancelled: this only proves the tip of develop builds, so an
# older run tells us nothing once a newer commit has landed.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build:
    if: github.ref_name != 'main'
    runs-on: ubuntu-latest
    env:
      VITE_HELIUS_API_KEY: ${{ secrets.VITE_HELIUS_API_KEY }}
      VITE_BITQUERY_API_KEY: ${{ secrets.VITE_BITQUERY_API_KEY }}
      NEXT_PUBLIC_GMAPS_API_KEY: ${{ secrets.GMAPS_API_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUB_KEY }}
      NEXT_PUBLIC_GMAPS_MAP_ID: ${{ secrets.GMAPS_MAP_ID }}
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 11.5.0
          run_install: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Tests
        run: pnpm -r test
      - name: Build
        run: pnpm build
        env:
          CI: true
