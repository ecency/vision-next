name: Self-Hosted CI/CD

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'apps/self-hosted/**'
      - 'packages/**'

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10.18.1
          run_install: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: true
      - name: Run self-hosted tests
        run: pnpm --filter @ecency/self-hosted test
      # Hosting API is a standalone npm project (not part of pnpm workspace)
      # with its own Dockerfile and independent dependency tree
      - name: Run hosting API tests
        run: cd apps/self-hosted/hosting/api && npm install && npm test

  build-blog:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=develop" >> $GITHUB_OUTPUT
          fi

      - name: Build and push blog image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/self-hosted/Dockerfile
          push: true
          tags: ecency/self-hosted:${{ steps.tag.outputs.tag }}
          build-args: |
            PNPM_VERSION=10.18.1

  build-api:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=develop" >> $GITHUB_OUTPUT
          fi

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/self-hosted/hosting/api
          file: ./apps/self-hosted/hosting/api/Dockerfile
          push: true
          tags: ecency/hosting-api:${{ steps.tag.outputs.tag }}

  deploy-staging:
    needs: [build-blog, build-api]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_PASSWORD: ${{ secrets.HOSTING_POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.HOSTING_JWT_SECRET }}
          PAYMENT_ACCOUNT: ${{ secrets.HOSTING_PAYMENT_ACCOUNT }}
          ACME_EMAIL: ${{ secrets.HOSTING_ACME_EMAIL }}
          CF_API_EMAIL: ${{ secrets.CF_API_EMAIL }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST_HOSTING_STAGING }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: POSTGRES_PASSWORD,JWT_SECRET,PAYMENT_ACCOUNT,ACME_EMAIL,CF_API_EMAIL,CF_API_KEY
          script: |
            export POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            export JWT_SECRET=$JWT_SECRET
            export PAYMENT_ACCOUNT=$PAYMENT_ACCOUNT
            export ACME_EMAIL=$ACME_EMAIL
            export CF_API_EMAIL=$CF_API_EMAIL
            export CF_API_KEY=$CF_API_KEY
            cd ~/hosting
            docker pull ecency/self-hosted:develop
            docker pull ecency/hosting-api:develop
            TAG=develop docker compose up -d

  deploy:
    needs: [build-blog, build-api]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_PASSWORD: ${{ secrets.HOSTING_POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.HOSTING_JWT_SECRET }}
          PAYMENT_ACCOUNT: ${{ secrets.HOSTING_PAYMENT_ACCOUNT }}
          ACME_EMAIL: ${{ secrets.HOSTING_ACME_EMAIL }}
          CF_API_EMAIL: ${{ secrets.CF_API_EMAIL }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST_HOSTING }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: POSTGRES_PASSWORD,JWT_SECRET,PAYMENT_ACCOUNT,ACME_EMAIL,CF_API_EMAIL,CF_API_KEY
          script: |
            export POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            export JWT_SECRET=$JWT_SECRET
            export PAYMENT_ACCOUNT=$PAYMENT_ACCOUNT
            export ACME_EMAIL=$ACME_EMAIL
            export CF_API_EMAIL=$CF_API_EMAIL
            export CF_API_KEY=$CF_API_KEY
            cd ~/hosting
            docker pull ecency/self-hosted:latest
            docker pull ecency/hosting-api:latest
            TAG=latest docker compose up -d
