name: Verify Sentry release source maps
description: |
  Confirms that a Sentry release exists and has at least one file attached.
  Used after the Docker build that runs `@sentry/nextjs` source-map upload as
  a side effect — that upload can silently no-op (invalid token, scope, rate
  limit) and leave production stack traces minified. This action fails the
  workflow before deploy if no source maps were uploaded under the given
  release name. When `auth-token` is empty (forks, PR builds), the step
  skips with a warning instead of failing.

inputs:
  release:
    required: true
    description: 'Sentry release identifier (e.g. ecency-next@<commit-sha>)'
  auth-token:
    required: true
    description: Sentry auth token. Pass empty string to skip verification.
  org:
    required: false
    default: ecency
    description: Sentry organization slug
  project:
    required: false
    default: ecency-next
    description: Sentry project slug
  sentry-url:
    required: false
    default: https://de.sentry.io
    description: |
      Sentry API base URL. Defaults to the EU region because the ecency org
      lives there. Set to https://sentry.io for orgs in the US region.
      Org-scoped tokens only authenticate writes against the regional URL —
      using the wrong region returns 401 "Invalid org token" silently.

runs:
  using: composite
  steps:
    - name: Verify
      shell: bash
      env:
        SENTRY_AUTH_TOKEN: ${{ inputs.auth-token }}
        SENTRY_RELEASE: ${{ inputs.release }}
        SENTRY_ORG: ${{ inputs.org }}
        SENTRY_PROJECT: ${{ inputs.project }}
        SENTRY_URL: ${{ inputs.sentry-url }}
      run: |
        if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
          echo "::warning::SENTRY_AUTH_TOKEN not set — skipping source-map verification"
          exit 0
        fi
        set -euo pipefail
        # `@sentry/nextjs` v8 uploads source maps as artifact bundles
        # (--use-artifact-bundle), not as legacy "release files". The legacy
        # /releases/{ver}/files/ endpoint doesn't see artifact bundles — we
        # have to check /files/source-maps/ which lists artifact-bundle
        # entries alongside any legacy file uploads. The `?query=` filter
        # accepts the release name as a free-text match against entry names.
        ENCODED_QUERY=$(printf '%s' "${SENTRY_RELEASE}" | jq -sRr @uri)
        echo "Checking artifact bundle for ${SENTRY_RELEASE}…"
        response=$(curl -sS -w "\n%{http_code}" \
          -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
          "${SENTRY_URL}/api/0/projects/${SENTRY_ORG}/${SENTRY_PROJECT}/files/source-maps/?query=${ENCODED_QUERY}&per_page=10")
        body=$(echo "$response" | sed '$d')
        code=$(echo "$response" | tail -n1)
        if [ "$code" != "200" ]; then
          echo "::error::Sentry API returned ${code} querying source-maps for ${SENTRY_RELEASE}"
          echo "$body"
          exit 1
        fi
        # Match the release name exactly (the server-side `query` is fuzzy).
        # Treat fileCount of -1 (artifact bundle) the same as a positive
        # legacy file count — both indicate maps are uploaded and indexed.
        match=$(echo "$body" | jq --arg r "${SENTRY_RELEASE}" '[.[] | select(.name == $r)] | length')
        if [ "$match" -lt 1 ]; then
          echo "::error::No source-map artifact bundle found for ${SENTRY_RELEASE} — upload likely no-op'd"
          echo ""
          echo "Most recent source-map uploads in ${SENTRY_ORG}/${SENTRY_PROJECT}:"
          curl -sS -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            "${SENTRY_URL}/api/0/projects/${SENTRY_ORG}/${SENTRY_PROJECT}/files/source-maps/?per_page=5" \
            | jq -r '.[] | "  - \(.name) [\(.type), \(if .fileCount == -1 then "artifact bundle" else "files: \(.fileCount)" end), \(.date))]"'
          echo ""
          echo "If a different name shows up here, the plugin uploaded under that release identifier."
          echo "Check the Docker build logs for 'Successfully uploaded' / [@sentry/nextjs] lines."
          exit 1
        fi
        echo "✓ Sentry release ${SENTRY_RELEASE} has source maps uploaded"
